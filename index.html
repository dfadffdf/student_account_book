<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대학생 맞춤형 프리미엄 자산 관리 대시보드</title>
    <style>
        :root {
            --bg-main: #0F172A;
            --bg-card: #1E293B;
            --border-color: #334155;
            --accent-mint: #10B981;
            --accent-blue: #3B82F6;
            --accent-red: #EF4444;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --sidebar-width: 240px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* 🔒 전체 컨테이너 및 클릭 활성화 */
        .dashboard-container {
            display: flex; width: 100%; height: 100%;
            background-color: var(--bg-main);
            position: relative;
            pointer-events: auto; /* 모든 클릭 강제 허용 */
        }

        /* 🔏 사이드바 메뉴 클릭 복구 */
        .sidebar {
            width: var(--sidebar-width); background-color: #0B0F19;
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box;
            position: relative; z-index: 50; /* 최상단으로 올림 */
        }

        .logo { font-size: 20px; font-weight: bold; color: var(--accent-mint); margin-bottom: 40px; }
        .menu-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        
        .menu-item {
            display: flex; align-items: center; gap: 12px; padding: 14px 16px;
            color: var(--text-muted); text-decoration: none; border-radius: 12px; font-weight: 500;
            cursor: pointer; position: relative; z-index: 60;
        }
        .menu-item:hover, .menu-item.active { background-color: var(--bg-card); color: var(--text-main); }
        .menu-item.active { border-left: 4px solid var(--accent-blue); }

        /* 메인 콘텐츠 영역 */
        .main-content { flex: 1; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; position: relative; z-index: 10; }
        .card { background-color: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); padding: 18px; box-sizing: border-box; position: relative; z-index: 20; }
        .card-title { font-size: 15px; font-weight: 600; margin-top: 0; margin-bottom: 12px; }

        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .summary-card { display: flex; flex-direction: column; gap: 5px; }
        .summary-label { font-size: 12px; color: var(--text-muted); }
        .summary-value { font-size: 24px; font-weight: bold; }
        .value-income { color: var(--accent-blue); }
        .value-expense { color: var(--accent-red); }
        .value-balance { color: var(--accent-mint); }

        .middle-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 15px; }
        
        /* ⚙️ 입력 요소 클릭 보장 및 스타일 */
        .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .form-group label { font-size: 12px; color: var(--text-muted); }

        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%; padding: 10px; background-color: var(--bg-main);
            border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); 
            box-sizing: border-box; font-size: 13px; position: relative; z-index: 30;
        }
        
        /* 🎨 [해결] 카테고리 클릭 시 글자가 하얗게 안 보이던 버그 수정 */
        select option {
            background-color: #1E293B !important; /* 강제로 어두운 배경 부여 */
            color: #F8FAFC !important;           /* 강제로 흰색 글자 부여 */
        }

        /* 🔄 [해결] 날짜, 카테고리, 추가 버튼 가로 배치 레이아웃 */
        .horizontal-input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end; /* 하단 라인 맞춤 */
            margin-bottom: 15px;
        }

        .category-add-box { display: flex; gap: 6px; width: 100%; }
        
        .btn-mini {
            padding: 0 14px; background-color: #334155; border: none;
            border-radius: 8px; color: var(--text-main); cursor: pointer; font-size: 12px; 
            height: 38px; flex-shrink: 0; position: relative; z-index: 30;
        }
        .btn-mini:hover { background-color: #475569; }

        /* 🎯 [해결] 대시보드 반영 버튼 클릭 정상화 */
        .btn-submit {
            width: 100%; padding: 12px; background-color: var(--accent-mint); color: var(--bg-main);
            border: none; border-radius: 8px; font-weight: bold; font-size: 14px; 
            cursor: pointer; position: relative; z-index: 40; display: block;
        }
        .btn-submit:hover { opacity: 0.9; }

        /* 📉 차트 겹침 현상 방지 (클릭을 막던 주범 수정) */
        .charts-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 160px; }
        .chart-box { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .chart-box canvas { max-width: 100%; max-height: 130px; pointer-events: none; } /* 차트가 클릭 방해 안 하게 설정 */
        .chart-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }

        .table-container { max-height: 150px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background-color: var(--bg-card); color: var(--text-muted); font-size: 12px; padding: 8px; border-bottom: 1px solid var(--border-color); text-align: left; }
        td { padding: 10px 8px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { flex: 1; padding: 10px; border: 1px solid var(--border-color); background: none; color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: bold; position: relative; z-index: 30; }
        .type-btn.active.income { background-color: var(--accent-blue); color: var(--text-main); border-color: var(--accent-blue); }
        .type-btn.active.expense { background-color: var(--accent-red); color: var(--text-main); border-color: var(--accent-red); }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">✨ TossAsset Mini</div>
            <ul class="menu-list">
                <li><div class="menu-item active">📊 대시보드</div></li>
                <li><div class="menu-item">✍️ 내역 입력</div></li>
                <li><div class="menu-item">📈 지출 분석</div></li>
                <li><div class="menu-item">⚙️ 설정</div></li>
            </ul>
        </aside>

        <main class="main-content">
            <section class="summary-grid">
                <div class="card summary-card">
                    <span class="summary-label">이번 달 총 수입 🔵</span>
                    <span class="summary-value value-income" id="topIncome">0 원</span>
                </div>
                <div class="card summary-card">
                    <span class="summary-label">이번 달 총 지출 🔴</span>
                    <span class="summary-value value-expense" id="topExpense">0 원</span>
                </div>
                <div class="card summary-card">
                    <span class="summary-label">현재 자산 잔액 💸</span>
                    <span class="summary-value value-balance" id="topBalance">0 원</span>
                </div>
            </section>

            <section class="middle-grid">
                <div class="card">
                    <div class="card-title">✍️ 자산 변동 내역 기록</div>
                    <div class="type-selector">
                        <button type="button" class="type-btn" id="typeIncBtn" onclick="changeType('income')">수입</button>
                        <button type="button" class="type-btn active expense" id="typeExpBtn" onclick="changeType('expense')">지출</button>
                    </div>

                    <div class="horizontal-input-row">
                        <div class="form-group">
                            <label>날짜 선택</label>
                            <input type="date" id="formDate">
                        </div>
                        <div class="form-group">
                            <label>카테고리</label>
                            <select id="formCategory">
                                <option value="🍔 식비">🍔 식비</option>
                                <option value="🚌 교통비">🚌 교통비</option>
                                <option value="☕ 커피">☕ 커피</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1.2;">
                            <label>카테고리 직접 추가</label>
                            <div class="category-add-box">
                                <input type="text" id="newCategoryInput" placeholder="새 이름">
                                <button type="button" class="btn-mini" onclick="addNewCategory()">추가</button>
                            </div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; margin-bottom: 15px;">
                        <div class="form-group">
                            <label>금액 (원)</label>
                            <input type="number" id="formAmount" placeholder="숫자만 입력">
                        </div>
                        <div class="form-group">
                            <label>메모 사항</label>
                            <input type="text" id="formMemo" placeholder="간단한 메모 입력">
                        </div>
                    </div>

                    <button type="button" class="btn-submit" onclick="insertItem()">대시보드에 반영</button>
                </div>

                <div class="card">
                    <div class="card-title">📈 리얼타임 데이터 시각화</div>
                    <div class="charts-wrapper">
                        <div class="chart-box">
                            <span class="chart-label">지출 비율</span>
                            <canvas id="pieChartCanvas"></canvas>
                        </div>
                        <div class="chart-box">
                            <span class="chart-label">월별 추이</span>
                            <canvas id="barChartCanvas"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <section class="card" style="flex: 1; min-height: 150px;">
                <div class="card-title">📋 최근 거래 원장 관리</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th>구분</th>
                                <th>카테고리</th>
                                <th>메모</th>
                                <th>금액</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td>2026-06-07</td>
                                <td style="color:var(--accent-red)">🔴 지출</td>
                                <td>🍔 식비</td>
                                <td style="color:var(--text-muted)">저녁 삼겹살</td>
                                <td style="font-weight:bold; color:var(--accent-red)">-15,000원</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 프론트엔드 버튼 토글 및 입력 기본 로직 (UI 테스트용)
        let currentType = 'expense';
        document.getElementById('formDate').valueAsDate = new Date();

        function changeType(type) {
            currentType = type;
            document.getElementById('typeIncBtn').className = type === 'income' ? "type-btn active income" : "type-btn";
            document.getElementById('typeExpBtn').className = type === 'expense' ? "type-btn active expense" : "type-btn";
        }

        function addNewCategory() {
            const val = document.getElementById('newCategoryInput').value.trim();
            if(!val) return;
            const sel = document.getElementById('formCategory');
            const opt = document.createElement('option');
            opt.value = val; opt.text = val;
            sel.appendChild(opt);
            sel.value = val;
            document.getElementById('newCategoryInput').value = '';
        }

        function insertItem() {
            const amt = document.getElementById('formAmount').value;
            if(!amt) { alert("금액을 입력해주세요!"); return; }
            alert("대시보드에 정상 반영되었습니다!");
            document.getElementById('formAmount').value = '';
            document.getElementById('formMemo').value = '';
        }
    </script>
</body>
</html>
